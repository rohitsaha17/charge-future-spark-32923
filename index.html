      <header>
        <h1>A Plus Charge – EV Charging Solutions in Northeast India</h1>
        <p>Northeast India's largest and most trusted electric vehicle charging network, powering clean mobility across Assam, Meghalaya, Arunachal Pradesh, and all Seven Sister states.</p>
      </header>
      <main>
        <section>
          <h2>Our EV Charging Services</h2>
          <p>A Plus Charge offers a complete range of EV charging infrastructure — from 3.3kW residential home chargers to 7.4kW AC public chargers and powerful 30kW to 60kW DC fast chargers. Whether you need overnight home charging or rapid highway top-ups, we have the right solution for every electric vehicle owner in Northeast India.</p>
          <h3>Residential Charging</h3>
          <p>Install a smart 3.3kW home charger for convenient overnight charging. Ideal for daily commuters in Guwahati, Shillong, and other cities across the Northeast.</p>
          <h3>AC Public Charging – 7.4kW</h3>
          <p>Our AC chargers are perfect for malls, offices, hotels, and public parking areas. Reliable, cost-effective, and easy to install with minimal infrastructure requirements.</p>
          <h3>DC Fast Charging – 30kW &amp; 60kW</h3>
          <p>High-speed DC fast chargers for highway corridors and commercial locations. Charge your EV up to 80% in under 45 minutes with our 60kW stations.</p>
        </section>
        <section>
          <h2>Why Choose A Plus Charge?</h2>
          <p>As the first-mover in Northeast India's EV charging space, A Plus Charge brings unmatched expertise in terrain-adaptive installations, local language support, and deep regional partnerships. We work with leading automotive brands including Tata Motors, MG Motor, Ather Energy, and OSM.</p>
          <h3>First-Mover Advantage</h3>
          <p>We pioneered EV charging infrastructure in Northeast India, establishing the region's first network of public fast chargers along key corridors.</p>
          <h3>Strategic Partnerships</h3>
          <p>Partnered with GMDA, AAI, Imperia Vista, and leading EV manufacturers to build a comprehensive charging ecosystem across the region.</p>
          <h3>Terrain-Optimised Installations</h3>
          <p>Our engineering team specialises in installing chargers across the challenging hilly terrain of Northeast India, ensuring reliable operation in all weather conditions.</p>
        </section>
        <section>
          <h2>Become a Charging Station Partner</h2>
          <p>Earn attractive returns by hosting an EV charging station at your location. We offer both CAPEX and OPEX partnership models with 15-20% projected ROI. A Plus Charge handles installation, maintenance, and operations — you provide the space and earn passive income from the growing EV market.</p>
        </section>
        <section>
          <h2>Investment Opportunities</h2>
          <p>Invest in Northeast India's fastest-growing clean energy infrastructure. The EV market is projected to grow 49% CAGR through 2030, and A Plus Charge is positioned as the region's market leader. Join us as an investor and be part of the sustainable mobility revolution.</p>
        </section>
        <section>
          <h2>Find a Charger Near You</h2>
          <p>Locate A Plus Charge stations across Guwahati, Shillong, and major highways in Assam and Meghalaya. Our network is expanding rapidly with new stations added every month. Download the A Plus Charge app on Google Play or the App Store to find real-time charger availability.</p>
        </section>
        <section>
          <h2>Frequently Asked Questions</h2>
          <h3>What types of EV chargers do you offer?</h3>
          <p>We offer residential chargers (3.3kW), AC public chargers (7.4kW), and DC fast chargers (30kW and 60kW) to meet various charging needs across Northeast India.</p>
          <h3>How can I become a charging station partner?</h3>
          <p>Visit our Partner page to explore partnership opportunities. We offer both CAPEX and OPEX models with attractive ROI projections and full operational support.</p>
          <h3>Where are your charging stations located?</h3>
          <p>We have a strong presence in Northeast India, particularly in Guwahati and along the Guwahati-Shillong highway, with expansion plans across major highways and urban centres in all Seven Sister states.</p>
        </section>
