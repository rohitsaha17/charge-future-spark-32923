    <!-- Critical CSS for LCP - Inline styles for above-fold content -->
    <style>
      /* Critical CSS for initial render - prevents CLS */
      html { scroll-behavior: smooth; }
      body { 
        margin: 0; 
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #fff;
        -webkit-font-smoothing: antialiased;

      }
      #root { min-height: 100vh; }
      /* Reserve space for navigation to prevent CLS */
      .nav-placeholder { height: 80px; }
      /* LCP optimization - reserve space for hero */
      .hero-placeholder { 
        min-height: 100vh; 
        background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
      }
      /* Prevent layout shift from loading states */
      img { max-width: 100%; height: auto; }
      /* Font loading optimization */
      @font-face {
        font-family: 'Plus Jakarta Sans';
        font-display: swap;
        src: local('Plus Jakarta Sans');
      }
      @font-face {
        font-family: 'Space Grotesk';
        font-display: swap;
        src: local('Space Grotesk');
      }
    </style>
    
    <!-- Google Fonts - Optimized loading with font-display: swap -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">

</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Defer non-critical third-party scripts -->
    <script type="text/javascript" defer>
      // Load UnicornStudio after main content is interactive
      window.addEventListener('load', function() {
        setTimeout(function() {
          if(!window.UnicornStudio){
            window.UnicornStudio={isInitialized:!1};
            var i=document.createElement("script");
            i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v1.4.32/dist/unicornStudio.umd.js";
            i.onload=function(){
              window.UnicornStudio.isInitialized||(UnicornStudio.init(),window.UnicornStudio.isInitialized=!0)
            };
            (document.head || document.body).appendChild(i);
          }
        }, 2000);
      });
    </script>
    
    <!-- Service Worker Registration for Asset Caching -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
    
    <!-- Web Vitals monitoring (development only) -->
    <script type="module">
      if (location.hostname === 'localhost' || location.hostname.includes('lovable')) {
        import('https://unpkg.com/web-vitals@3/dist/web-vitals.iife.js').then(({ onCLS, onINP, onLCP, onFCP, onTTFB }) => {
          const logVital = (metric) => {
            console.log(`[Web Vital] ${metric.name}: ${metric.value.toFixed(2)}${metric.name === 'CLS' ? '' : 'ms'}`);
          };
          onCLS(logVital);
          onINP(logVital);
          onLCP(logVital);
          onFCP(logVital);
          onTTFB(logVital);
        }).catch(() => {});
      }
    </script>
  </body>
</html>
